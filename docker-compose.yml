version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: infracore_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root2026
      POSTGRES_DB: infracore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: infracore_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: